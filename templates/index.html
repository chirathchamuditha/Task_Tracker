<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task Tracker</title>
  <style>
    :root {
      --ink: #1c1b1a;
      --muted: #6b6a66;
      --line: #e3e1db;
      --bg: #faf9f6;
      --card: #ffffff;
      --accent: #2f6f4e;
      --accent-soft: #e7f1eb;
      --high: #b23b3b;
      --medium: #b07d1f;
      --low: #5a7a8c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
    }
    .wrap { max-width: 640px; margin: 0 auto; padding: 40px 20px 80px; }
    header { border-bottom: 1px solid var(--line); padding-bottom: 20px; margin-bottom: 28px; }
    .eyebrow {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent);
    }
    h1 { margin: 6px 0 4px; font-size: 28px; font-weight: 600; }
    .sub { color: var(--muted); font-size: 15px; margin: 0; }
    .summary {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px; color: var(--muted); margin-top: 14px;
    }
    form { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    input[type=text], select {
      font: inherit; padding: 10px 12px; border: 1px solid var(--line);
      border-radius: 8px; background: var(--card); color: var(--ink);
    }
    input[type=text] { flex: 1; min-width: 180px; }
    button {
      font: inherit; font-weight: 500; cursor: pointer;
      padding: 10px 16px; border: none; border-radius: 8px;
      background: var(--accent); color: #fff;
    }
    button:hover { opacity: 0.92; }
    ul { list-style: none; padding: 0; margin: 0; }
    li {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; background: var(--card);
      border: 1px solid var(--line); border-radius: 10px; margin-bottom: 10px;
    }
    li.done .title { text-decoration: line-through; color: var(--muted); }
    .title { flex: 1; }
    .tag {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px; padding: 2px 8px; border-radius: 999px;
      background: var(--accent-soft);
    }
    .tag.high { color: var(--high); background: #f7e8e8; }
    .tag.medium { color: var(--medium); background: #f7efdc; }
    .tag.low { color: var(--low); background: #e8eef2; }
    .toggle {
      background: none; color: var(--muted); border: 1px solid var(--line);
      padding: 6px 10px; font-size: 13px;
    }
    .toggle:hover { color: var(--ink); }
    .error { color: var(--high); font-size: 14px; min-height: 20px; margin: -14px 0 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">build: passing</div>
      <h1>Task Tracker</h1>
      <p class="sub">A tiny app wired to a CI/CD pipeline.</p>
      <div class="summary" id="summary">loading…</div>
    </header>

    <form id="add-form">
      <input type="text" id="title" placeholder="Add a task…" maxlength="100" autocomplete="off">
      <select id="priority">
        <option value="high">High</option>
        <option value="medium" selected>Medium</option>
        <option value="low">Low</option>
      </select>
      <button type="submit">Add</button>
    </form>
    <div class="error" id="error"></div>

    <ul id="list"></ul>
  </div>

  <script>
    const list = document.getElementById("list");
    const summary = document.getElementById("summary");
    const errorBox = document.getElementById("error");

    async function load() {
      const res = await fetch("/api/tasks");
      const data = await res.json();
      render(data);
    }

    function render(data) {
      const s = data.summary;
      summary.textContent = `${s.remaining} remaining · ${s.done} done · ${s.total} total`;
      list.innerHTML = "";
      for (const task of data.tasks) {
        const li = document.createElement("li");
        if (task.done) li.classList.add("done");
        li.innerHTML = `
          <span class="tag ${task.priority}">${task.priority}</span>
          <span class="title">${escapeHtml(task.title)}</span>
          <button class="toggle" data-id="${task.id}">${task.done ? "undo" : "done"}</button>`;
        list.appendChild(li);
      }
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById("add-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.textContent = "";
      const title = document.getElementById("title").value;
      const priority = document.getElementById("priority").value;
      const res = await fetch("/api/create", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, priority }),
      });
      if (res.ok) {
        document.getElementById("title").value = "";
        load();
      } else {
        const err = await res.json();
        errorBox.textContent = err.error || "Something went wrong";
      }
    });

    list.addEventListener("click", async (e) => {
      const btn = e.target.closest(".toggle");
      if (!btn) return;
      await fetch(`/api/tasks/${btn.dataset.id}/toggle`, { method: "POST" });
      load();
    });

    load();
  </script>
</body>
</html>
